<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <rect width="64" height="64" rx="12" fill="#fff6b3"/>

  <g
    fill="#35e6ff"
    stroke="#000000"
    stroke-width="3"
    stroke-linejoin="round"
    stroke-linecap="round"
    paint-order="stroke fill"
    transform="translate(1.6,-3) scale(0.95,1.34)"
  >
    <animate
      attributeName="fill"
      values="#35e6ff;#7dff3a;#ff4fd8;#ffcf3a;#35e6ff"
      dur="6s"
      repeatCount="indefinite"
    />
    <text
      x="17"
      y="42"
      text-anchor="middle"
      font-family="Arial Black, Impact, sans-serif"
      font-size="56"
      font-weight="900"
    >B</text>

    <text
      x="47"
      y="42"
      text-anchor="middle"
      font-family="Arial Black, Impact, sans-serif"
      font-size="56"
      font-weight="900"
    >X</text>
  </g>
</svg>
