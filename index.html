<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BX Colour Selector</title>
  <meta name="description" content="BX Colour Selector is a fullscreen browser colour picker with live HEX and RGB readout, screen pick support, clipboard copy, and a moving preview swatch.">
  <meta name="robots" content="index,follow,max-image-preview:large">
  <meta name="author" content="Radim Brixi">
  <meta name="theme-color" content="#fff6b3">
  <link rel="canonical" href="https://radimbrixi.github.io/bx-colour-selector/">
  <meta property="og:type" content="website">
  <meta property="og:site_name" content="BX Colour Selector">
  <meta property="og:title" content="BX Colour Selector">
  <meta property="og:description" content="Fullscreen colour selector with live HEX and RGB values, copy controls, and browser EyeDropper support.">
  <meta property="og:url" content="https://radimbrixi.github.io/bx-colour-selector/">
  <meta property="og:image" content="https://radimbrixi.github.io/bx-colour-selector/favicon.svg">
  <meta name="twitter:card" content="summary">
  <meta name="twitter:title" content="BX Colour Selector">
  <meta name="twitter:description" content="Fullscreen colour selector with live HEX and RGB values, copy controls, and browser EyeDropper support.">
  <meta name="twitter:image" content="https://radimbrixi.github.io/bx-colour-selector/favicon.svg">
  <link rel="icon" id="dynamicFavicon" type="image/png" href="favicon.svg">
  <script>
    window.BX_ANALYTICS = {
      // To enable GoatCounter, set this to:
      // "https://YOUR-CODE.goatcounter.com/count"
      goatcounterUrl: ""
    };

    if (window.BX_ANALYTICS.goatcounterUrl) {
      const analyticsScript = document.createElement("script");
      analyticsScript.async = true;
      analyticsScript.src = "https://gc.zgo.at/count.js";
      analyticsScript.dataset.goatcounter = window.BX_ANALYTICS.goatcounterUrl;
      document.head.appendChild(analyticsScript);
    }
  </script>
  <style>
    :root {
      color-scheme: light;
      font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #000;
      cursor: crosshair;
    }

    canvas {
      display: block;
      width: 100vw;
      height: 100vh;
    }

    .hero-title {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      margin: 0;
      font-family: Verdana, Geneva, sans-serif;
      font-size: clamp(40px, 8vw, 96px);
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      text-align: center;
      white-space: nowrap;
      perspective: 900px;
      pointer-events: none;
      opacity: 1;
      transition: transform 1600ms cubic-bezier(0.12, 0.02, 0.18, 1), opacity 2200ms ease;
      z-index: 1;
    }

    .hero-title-inner {
      display: inline-block;
      transform: rotateX(22deg) scaleX(1.34) scaleY(0.72);
      transform-origin: center center;
      color: #ffe48a;
      background: linear-gradient(
        180deg,
        #fff9d2 0%,
        #ffe37f 18%,
        #ffca2c 42%,
        #ffd95f 60%,
        #fff3b4 78%,
        #b87900 100%
      );
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
      -webkit-text-stroke: 2px #2d0359;
      text-shadow:
        0 -1px 0 rgba(255, 252, 212, 0.95),
        0 2px 0 rgba(255, 244, 179, 0.95),
        0 4px 0 rgba(190, 122, 0, 0.75),
        0 8px 0 #3e0b74,
        0 12px 18px rgba(49, 0, 103, 0.95),
        0 0 30px rgba(255, 233, 134, 0.55),
        0 0 20px rgba(255, 214, 90, 0.65),
        0 0 42px rgba(255, 214, 90, 0.42);
      filter: drop-shadow(0 0 18px rgba(77, 0, 125, 0.55));
      transition: transform 1600ms cubic-bezier(0.12, 0.02, 0.18, 1);
    }

    .hero-title.is-hidden {
      opacity: 0;
      transform: translate(-38%, -260%) scale(0.16);
    }

    .hero-title.is-hidden .hero-title-inner {
      transform: rotateX(62deg) scaleX(0.96) scaleY(0.34);
    }

    .hint {
      position: fixed;
      top: 16px;
      left: 16px;
      padding: 8px 12px;
      border-radius: 999px;
      background: rgba(0, 0, 0, 0.55);
      color: #fff;
      font-family: Consolas, "SFMono-Regular", "Cascadia Mono", "Roboto Mono", monospace;
      font-size: clamp(11px, 1.4vw, 14px);
      line-height: 1.2;
      letter-spacing: 0.02em;
      font-variant-numeric: tabular-nums;
      display: grid;
      grid-template-columns: 12ch 16ch 48ch;
      column-gap: 1ch;
      align-items: center;
      white-space: nowrap;
      width: min(88ch, calc(100vw - 32px));
      user-select: none;
      pointer-events: none;
      backdrop-filter: blur(8px);
    }

    .hint-group {
      display: flex;
      align-items: center;
      gap: 1ch;
      min-width: 0;
    }

    .hint-value {
      display: inline-block;
      white-space: pre;
    }

    .hint-value.hex {
      width: 7ch;
    }

    .hint-value.dec {
      width: 11ch;
    }

    .hint-status {
      display: block;
      vertical-align: bottom;
    }

    .swatch {
      position: fixed;
      top: 16px;
      right: 16px;
      width: clamp(48px, 4vw, 64px);
      height: clamp(48px, 4vw, 64px);
      border-radius: 50%;
      border: 3px solid rgba(255, 255, 255, 0.88);
      background: #000000;
      box-shadow: 0 10px 24px rgba(0, 0, 0, 0.28), inset 0 0 0 1px rgba(0, 0, 0, 0.2);
      pointer-events: none;
    }

  </style>
</head>
<body>
  <canvas id="picker" aria-label="Full page color picker"></canvas>
  <h1 class="hero-title" id="heroTitle"><span class="hero-title-inner">BX Colour Selector</span></h1>
  <div class="hint">
    <span class="hint-group">HEX <span class="hint-value hex" id="hexValue">#------</span> |</span>
    <span class="hint-group">DEC <span class="hint-value dec" id="decValue">---,---,---</span> |</span>
    <span class="hint-status" id="statusValue">Left: HEX | Wheel: DEC | Scroll: Zoom | Right: Screen</span>
  </div>
  <div class="swatch" id="swatch" aria-hidden="true"></div>

  <script>
    const canvas = document.getElementById("picker");
    const context = canvas.getContext("2d", { willReadFrequently: true });
    const faviconLink = document.getElementById("dynamicFavicon");
    const heroTitle = document.getElementById("heroTitle");
    const hint = document.querySelector(".hint");
    const swatch = document.getElementById("swatch");
    const hexValue = document.getElementById("hexValue");
    const decValue = document.getElementById("decValue");
    const statusValue = document.getElementById("statusValue");
    const defaultTitle = "BX Colour Selector";
    let hintAnchor = "top-left";
    let hintPosition = { left: 16, top: 16 };
    let animationFrameId = null;
    let lastPointer = null;
    let faviconAnimationId = null;
    let viewZoom = 1;
    let viewOffsetX = 0;
    let viewOffsetY = 0;

    const faviconPalette = [
      [0.0, "#35e6ff"],
      [0.33, "#7dff3a"],
      [0.66, "#ff4fd8"],
      [1.0, "#ffcf3a"]
    ];

    function hexToChannels(hex) {
      const normalized = hex.replace("#", "");
      return {
        r: Number.parseInt(normalized.slice(0, 2), 16),
        g: Number.parseInt(normalized.slice(2, 4), 16),
        b: Number.parseInt(normalized.slice(4, 6), 16)
      };
    }

    function mixColor(a, b, t) {
      const from = hexToChannels(a);
      const to = hexToChannels(b);
      const mix = (start, end) => Math.round(start + (end - start) * t);
      return `rgb(${mix(from.r, to.r)}, ${mix(from.g, to.g)}, ${mix(from.b, to.b)})`;
    }

    function colorAtPhase(phase) {
      const wrapped = ((phase % 1) + 1) % 1;

      for (let index = 0; index < faviconPalette.length; index += 1) {
        const current = faviconPalette[index];
        const next = faviconPalette[(index + 1) % faviconPalette.length];
        const currentStop = current[0];
        const nextStop = index === faviconPalette.length - 1 ? 1 + faviconPalette[0][0] : next[0];
        const adjusted = wrapped < currentStop ? wrapped + 1 : wrapped;

        if (adjusted >= currentStop && adjusted <= nextStop) {
          const localT = (adjusted - currentStop) / (nextStop - currentStop || 1);
          return mixColor(current[1], next[1], localT);
        }
      }

      return faviconPalette[0][1];
    }

    function drawAnimatedFavicon(color) {
      const iconCanvas = document.createElement("canvas");
      iconCanvas.width = 64;
      iconCanvas.height = 64;
      const iconContext = iconCanvas.getContext("2d");

      iconContext.fillStyle = "#fff6b3";
      iconContext.beginPath();
      iconContext.roundRect(0, 0, 64, 64, 12);
      iconContext.fill();

      iconContext.save();
      iconContext.translate(1.6, -3);
      iconContext.scale(0.95, 1.34);
      iconContext.fillStyle = color;
      iconContext.strokeStyle = "#000000";
      iconContext.lineWidth = 3;
      iconContext.lineJoin = "round";
      iconContext.lineCap = "round";
      iconContext.font = "900 56px Arial Black";
      iconContext.textAlign = "center";
      iconContext.textBaseline = "alphabetic";
      iconContext.strokeText("B", 17, 42);
      iconContext.fillText("B", 17, 42);
      iconContext.strokeText("X", 47, 42);
      iconContext.fillText("X", 47, 42);
      iconContext.restore();

      faviconLink.href = iconCanvas.toDataURL("image/png");
    }

    function startFaviconAnimation() {
      const startedAt = performance.now();

      function tick(now) {
        const phase = ((now - startedAt) % 6000) / 6000;
        drawAnimatedFavicon(colorAtPhase(phase));
        faviconAnimationId = window.setTimeout(() => {
          requestAnimationFrame(tick);
        }, 180);
      }

      drawAnimatedFavicon(colorAtPhase(0));
      requestAnimationFrame(tick);
    }

    function hsvToRgb(h, s, v) {
      const c = v * s;
      const hh = h / 60;
      const x = c * (1 - Math.abs((hh % 2) - 1));
      let r = 0;
      let g = 0;
      let b = 0;

      if (hh >= 0 && hh < 1) {
        r = c; g = x;
      } else if (hh < 2) {
        r = x; g = c;
      } else if (hh < 3) {
        g = c; b = x;
      } else if (hh < 4) {
        g = x; b = c;
      } else if (hh < 5) {
        r = x; b = c;
      } else {
        r = c; b = x;
      }

      const m = v - c;
      return {
        r: Math.round((r + m) * 255),
        g: Math.round((g + m) * 255),
        b: Math.round((b + m) * 255)
      };
    }

    function getColorAtPosition(x, y, width, height) {
      const hue = (x / Math.max(width - 1, 1)) * 360;
      const normalizedY = y / Math.max(height - 1, 1);

      let saturation;
      let value;

      if (normalizedY <= 0.5) {
        saturation = normalizedY * 2;
        value = 1;
      } else {
        saturation = 1;
        value = 1 - ((normalizedY - 0.5) * 2);
      }

      return hsvToRgb(hue, saturation, value);
    }

    function rgbToHex(r, g, b) {
      return "#" + [r, g, b]
        .map((value) => value.toString(16).padStart(2, "0"))
        .join("")
        .toUpperCase();
    }

    function padDec(value) {
      return String(value).padStart(3, " ");
    }

    function drawSpectrum() {
      const dpr = window.devicePixelRatio || 1;
      const width = Math.max(1, Math.floor(window.innerWidth * dpr));
      const height = Math.max(1, Math.floor(window.innerHeight * dpr));

      canvas.width = width;
      canvas.height = height;

      const image = context.createImageData(width, height);
      const pixels = image.data;

      for (let y = 0; y < height; y += 1) {
        for (let x = 0; x < width; x += 1) {
          const offset = (y * width + x) * 4;
          const virtual = getVirtualCoordinates(x, y, width, height);
          const { r, g, b } = getColorAtPosition(virtual.x, virtual.y, width, height);

          pixels[offset] = r;
          pixels[offset + 1] = g;
          pixels[offset + 2] = b;
          pixels[offset + 3] = 255;
        }
      }

      context.putImageData(image, 0, 0);
    }

    function getVisibleSpan() {
      return {
        width: 1 / viewZoom,
        height: 1 / viewZoom
      };
    }

    function clampView() {
      const span = getVisibleSpan();
      viewOffsetX = Math.max(0, Math.min(viewOffsetX, 1 - span.width));
      viewOffsetY = Math.max(0, Math.min(viewOffsetY, 1 - span.height));
    }

    function getVirtualCoordinates(x, y, width, height) {
      const span = getVisibleSpan();
      return {
        x: (viewOffsetX + (x / Math.max(width - 1, 1)) * span.width) * Math.max(width - 1, 1),
        y: (viewOffsetY + (y / Math.max(height - 1, 1)) * span.height) * Math.max(height - 1, 1)
      };
    }

    function updateTitle(r, g, b) {
      const hex = rgbToHex(r, g, b);
      const decText = `${padDec(r)},${padDec(g)},${padDec(b)}`;
      document.title = `${hex} | ${r},${g},${b}`;
      hexValue.textContent = hex;
      decValue.textContent = decText;
      statusValue.textContent = "Left: HEX | Wheel: DEC | Scroll: Zoom | Right: Screen";
      swatch.style.background = hex;
      return hex;
    }

    function hexToRgb(hex) {
      const normalized = hex.replace("#", "");
      return {
        r: Number.parseInt(normalized.slice(0, 2), 16),
        g: Number.parseInt(normalized.slice(2, 4), 16),
        b: Number.parseInt(normalized.slice(4, 6), 16)
      };
    }

    function getHintPosition(anchor) {
      const margin = 16;
      const hintWidth = hint.offsetWidth;
      const hintHeight = hint.offsetHeight;
      const positions = {
        "top-left": { left: margin, top: margin },
        "top-right": { left: window.innerWidth - hintWidth - margin, top: margin },
        "bottom-left": { left: margin, top: window.innerHeight - hintHeight - margin },
        "bottom-right": {
          left: window.innerWidth - hintWidth - margin,
          top: window.innerHeight - hintHeight - margin
        }
      };

      return positions[anchor];
    }

    function applyHintAnchor(anchor) {
      const position = getHintPosition(anchor);
      hintPosition = {
        left: Math.max(8, position.left),
        top: Math.max(8, position.top)
      };
      hint.style.left = `${hintPosition.left}px`;
      hint.style.top = `${hintPosition.top}px`;
      applySwatchAnchor(anchor);
    }

    function applySwatchAnchor(anchor) {
      const position = getSwatchPosition(anchor);
      swatch.style.left = `${Math.max(8, position.left)}px`;
      swatch.style.top = `${Math.max(8, position.top)}px`;
    }

    function getHintRectAt(position) {
      return {
        left: position.left,
        top: position.top,
        right: position.left + hint.offsetWidth,
        bottom: position.top + hint.offsetHeight
      };
    }

    function getSwatchPosition(anchor) {
      const margin = 16;
      const swatchWidth = swatch.offsetWidth;
      const swatchHeight = swatch.offsetHeight;
      const positions = {
        "top-left": {
          left: window.innerWidth - swatchWidth - margin,
          top: margin
        },
        "top-right": {
          left: margin,
          top: margin
        },
        "bottom-left": {
          left: window.innerWidth - swatchWidth - margin,
          top: window.innerHeight - swatchHeight - margin
        },
        "bottom-right": {
          left: margin,
          top: window.innerHeight - swatchHeight - margin
        }
      };

      return positions[anchor];
    }

    function getRectAt(position, width, height) {
      return {
        left: position.left,
        top: position.top,
        right: position.left + width,
        bottom: position.top + height
      };
    }

    function distanceToRect(pointer, rect) {
      const dx = Math.max(rect.left - pointer.x, 0, pointer.x - rect.right);
      const dy = Math.max(rect.top - pointer.y, 0, pointer.y - rect.bottom);
      return Math.hypot(dx, dy);
    }

    function pointHitsDangerZone(point, pointer, padding) {
      return (
        point.left <= pointer.x + padding &&
        point.right >= pointer.x - padding &&
        point.top <= pointer.y + padding &&
        point.bottom >= pointer.y - padding
      );
    }

    function buildEdgeRoute(start, end, pointer) {
      const margin = 16;
      const width = hint.offsetWidth;
      const height = hint.offsetHeight;
      const right = window.innerWidth - width - margin;
      const bottom = window.innerHeight - height - margin;
      const topLane = margin;
      const bottomLane = bottom;
      const leftLane = margin;
      const rightLane = right;
      const routeOptions = [
        [
          { left: start.left, top: topLane },
          { left: end.left, top: topLane },
          end
        ],
        [
          { left: start.left, top: bottomLane },
          { left: end.left, top: bottomLane },
          end
        ],
        [
          { left: leftLane, top: start.top },
          { left: leftLane, top: end.top },
          end
        ],
        [
          { left: rightLane, top: start.top },
          { left: rightLane, top: end.top },
          end
        ]
      ];
      const dangerPadding = 64;

      for (const route of routeOptions) {
        const allPoints = [start, ...route];
        const crossesPointer = allPoints.some((position) =>
          pointHitsDangerZone(getHintRectAt(position), pointer, dangerPadding)
        );

        if (!crossesPointer) {
          return route;
        }
      }

      return [end];
    }

    function animateHintTo(anchor, pointer) {
      if (animationFrameId) {
        cancelAnimationFrame(animationFrameId);
      }

      const start = { ...hintPosition };
      const end = getHintPosition(anchor);
      applySwatchAnchor(anchor);
      const waypoints = buildEdgeRoute(start, end, pointer);
      const segments = [{ ...start }, ...waypoints];
      const segmentDuration = 170;
      let segmentIndex = 0;
      let segmentStartTime = null;

      function step(timestamp) {
        if (segmentIndex >= segments.length - 1) {
          hintPosition = { ...end };
          hint.style.left = `${hintPosition.left}px`;
          hint.style.top = `${hintPosition.top}px`;
          animationFrameId = null;
          return;
        }

        if (segmentStartTime === null) {
          segmentStartTime = timestamp;
        }

        const from = segments[segmentIndex];
        const to = segments[segmentIndex + 1];
        const progress = Math.min((timestamp - segmentStartTime) / segmentDuration, 1);
        const eased = 1 - Math.pow(1 - progress, 3);
        const left = from.left + (to.left - from.left) * eased;
        const top = from.top + (to.top - from.top) * eased;

        hint.style.left = `${left}px`;
        hint.style.top = `${top}px`;
        hintPosition = { left, top };

        if (progress >= 1) {
          segmentIndex += 1;
          segmentStartTime = timestamp;
        }

        animationFrameId = requestAnimationFrame(step);
      }

      animationFrameId = requestAnimationFrame(step);
    }

    function updateHintAnchor(event) {
      const dangerPadding = 48;
      const hintRect = hint.getBoundingClientRect();
      const swatchRect = swatch.getBoundingClientRect();
      const isNearHint =
        event.clientX >= hintRect.left - dangerPadding &&
        event.clientX <= hintRect.right + dangerPadding &&
        event.clientY >= hintRect.top - dangerPadding &&
        event.clientY <= hintRect.bottom + dangerPadding;
      const isNearSwatch =
        event.clientX >= swatchRect.left - dangerPadding &&
        event.clientX <= swatchRect.right + dangerPadding &&
        event.clientY >= swatchRect.top - dangerPadding &&
        event.clientY <= swatchRect.bottom + dangerPadding;

      if (!isNearHint && !isNearSwatch) {
        return;
      }
      const pointer = { x: event.clientX, y: event.clientY };
      const anchors = ["top-left", "top-right", "bottom-right", "bottom-left"];
      let bestAnchor = hintAnchor;
      let bestScore = -1;

      for (const anchor of anchors) {
        if (anchor === hintAnchor) {
          continue;
        }

        const hintCandidate = getHintPosition(anchor);
        const swatchCandidate = getSwatchPosition(anchor);
        const hintCandidateRect = getRectAt(hintCandidate, hint.offsetWidth, hint.offsetHeight);
        const swatchCandidateRect = getRectAt(swatchCandidate, swatch.offsetWidth, swatch.offsetHeight);
        const score = Math.min(
          distanceToRect(pointer, hintCandidateRect),
          distanceToRect(pointer, swatchCandidateRect)
        );

        if (score > bestScore) {
          bestScore = score;
          bestAnchor = anchor;
        }
      }

      if (bestAnchor !== hintAnchor) {
        hintAnchor = bestAnchor;
        animateHintTo(hintAnchor, pointer);
      }
    }

    function decimalText(r, g, b) {
      return `${r},${g},${b}`;
    }

    function getCanvasCoordinates(event) {
      const rect = canvas.getBoundingClientRect();
      const scaleX = canvas.width / rect.width;
      const scaleY = canvas.height / rect.height;

      return {
        x: Math.max(0, Math.min(canvas.width - 1, Math.floor((event.clientX - rect.left) * scaleX))),
        y: Math.max(0, Math.min(canvas.height - 1, Math.floor((event.clientY - rect.top) * scaleY)))
      };
    }

    async function copyText(text) {
      if (navigator.clipboard && window.isSecureContext) {
        await navigator.clipboard.writeText(text);
        return;
      }

      const input = document.createElement("textarea");
      input.value = text;
      input.setAttribute("readonly", "");
      input.style.position = "fixed";
      input.style.opacity = "0";
      document.body.appendChild(input);
      input.select();
      document.execCommand("copy");
      document.body.removeChild(input);
    }

    function handlePointerMove(event) {
      heroTitle.classList.add("is-hidden");
      lastPointer = { x: event.clientX, y: event.clientY };
      const { x, y } = getCanvasCoordinates(event);
      const virtual = getVirtualCoordinates(x, y, canvas.width, canvas.height);
      const { r, g, b } = getColorAtPosition(virtual.x, virtual.y, canvas.width, canvas.height);
      updateTitle(r, g, b);
      updateHintAnchor(event);
    }

    async function copyAtEvent(event, mode) {
      const { x, y } = getCanvasCoordinates(event);
      const virtual = getVirtualCoordinates(x, y, canvas.width, canvas.height);
      const { r, g, b } = getColorAtPosition(virtual.x, virtual.y, canvas.width, canvas.height);
      const hex = updateTitle(r, g, b);
      const dec = decimalText(r, g, b);
      const textToCopy = mode === "dec" ? dec : hex;

      try {
        await copyText(textToCopy);
        statusValue.textContent = mode === "dec"
          ? `Copied DEC`
          : `Copied HEX`;
      } catch (error) {
        statusValue.textContent = mode === "dec"
          ? `DEC copy failed`
          : `HEX copy failed`;
      }
    }

    function handleWheel(event) {
      event.preventDefault();

      const { x, y } = getCanvasCoordinates(event);
      const span = getVisibleSpan();
      const normalizedX = x / Math.max(canvas.width - 1, 1);
      const normalizedY = y / Math.max(canvas.height - 1, 1);
      const targetX = viewOffsetX + normalizedX * span.width;
      const targetY = viewOffsetY + normalizedY * span.height;
      const factor = event.deltaY < 0 ? 1.2 : 1 / 1.2;
      const nextZoom = Math.max(1, Math.min(24, viewZoom * factor));

      if (nextZoom === viewZoom) {
        return;
      }

      viewZoom = nextZoom;
      const nextSpan = getVisibleSpan();
      viewOffsetX = targetX - normalizedX * nextSpan.width;
      viewOffsetY = targetY - normalizedY * nextSpan.height;
      clampView();
      drawSpectrum();

      const virtual = getVirtualCoordinates(x, y, canvas.width, canvas.height);
      const { r, g, b } = getColorAtPosition(virtual.x, virtual.y, canvas.width, canvas.height);
      updateTitle(r, g, b);
      statusValue.textContent = `Zoom ${viewZoom.toFixed(2)}x`;
    }

    async function pickFromScreen() {
      if (!("EyeDropper" in window)) {
        statusValue.textContent = "EyeDropper not supported";
        return;
      }

      try {
        heroTitle.classList.add("is-hidden");
        statusValue.textContent = "Pick any screen color";
        const result = await new EyeDropper().open();
        const { r, g, b } = hexToRgb(result.sRGBHex);
        updateTitle(r, g, b);
        statusValue.textContent = "Picked from screen";
      } catch (error) {
        statusValue.textContent = error?.name === "AbortError"
          ? "Screen pick canceled"
          : "Screen pick failed";
      }
    }

    window.addEventListener("resize", drawSpectrum);
    window.addEventListener("resize", () => {
      if (animationFrameId) {
        cancelAnimationFrame(animationFrameId);
        animationFrameId = null;
      }

      applyHintAnchor(hintAnchor);
    });
    canvas.addEventListener("mousemove", handlePointerMove);
    canvas.addEventListener("click", (event) => {
      copyAtEvent(event, "hex");
    });
    canvas.addEventListener("auxclick", (event) => {
      if (event.button !== 1) {
        return;
      }

      event.preventDefault();
      copyAtEvent(event, "dec");
    });
    canvas.addEventListener("mousedown", (event) => {
      if (event.button === 1) {
        event.preventDefault();
      }
    });
    canvas.addEventListener("wheel", handleWheel, { passive: false });
    canvas.addEventListener("contextmenu", (event) => {
      event.preventDefault();
      pickFromScreen();
    });
    canvas.addEventListener("mouseleave", () => {
      document.title = defaultTitle;
      hexValue.textContent = "#------";
      decValue.textContent = "---,---,---";
      statusValue.textContent = "Left: HEX | Wheel: DEC | Scroll: Zoom | Right: Screen";
      swatch.style.background = "#000000";
      hintAnchor = "top-left";
      if (animationFrameId) {
        cancelAnimationFrame(animationFrameId);
        animationFrameId = null;
      }
      applyHintAnchor(hintAnchor);
    });

    drawSpectrum();
    applyHintAnchor(hintAnchor);
    startFaviconAnimation();
  </script>
</body>
</html>
